<!-- templates/home.html -->

<div class="container">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            color: #333;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        h1, h2, h3 {
            margin-top: 0;
            color: rgb(61, 59, 59);
        }

        .section {
            margin-bottom: 35px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }

        th {
            background-color: #2d6cdf;
            color: white;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        ul {
            padding-left: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        select, button {
            padding: 10px;
            width: 100%;
            font-size: 14px;
            border-radius: 5px;
        }

        select {
            border: 1px solid #ccc;
        }

        button {
            background-color: #2d6cdf;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #1f57b5;
        }

        img {
            margin-top: 20px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2d6cdf;
            font-weight: bold;
        }

    </style>

        <div class="section">
                <h1>Upload Spreadsheet</h1>

                <form action="/upload" method="post" enctype="multipart/form-data">
                        <input type="file" name="file">
                        <button type="submit">Upload</button>
                </form>

        </div>
        
</div>
